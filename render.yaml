services:
  - type: web
    name: ecommerce-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://ecommerce-client.onrender.com
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: KHALTI_SECRET_KEY
        sync: false
      - key: KHALTI_BASE_URL
        sync: false
      - key: ESEWA_PRODUCT_CODE
        sync: false
      - key: ESEWA_SECRET_KEY
        sync: false
      - key: ESEWA_FORM_URL
        sync: false
      - key: ESEWA_STATUS_URL
        sync: false
      - key: NCM_API_TOKEN
        sync: false
      - key: NCM_BASE_URL
        sync: false
      - key: NCM_PICKUP_BRANCH
        sync: false

  - type: web
    name: ecommerce-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ecommerce-server.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
